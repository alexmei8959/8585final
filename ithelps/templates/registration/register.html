<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>註冊 - 8585 報修系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">📝 建立新帳號</h3>
                        <form method="post">
                            {% csrf_token %}
                            
                            {# 使用 Django 內建表單並套用 Bootstrap 樣式 #}
                            {% for field in form %}
                                <div class="mb-3">
                                    <label class="form-label fw-bold">{{ field.label }}</label>
                                    <input type="{{ field.field.widget.input_type }}" 
                                           name="{{ field.html_name }}" 
                                           class="form-control {% if field.errors %}is-invalid{% endif %}"
                                           placeholder="請輸入{{ field.label }}">
                                    {% if field.help_text %}
                                        <div class="form-text">{{ field.help_text }}</div>
                                    {% endif %}
                                    {% for error in field.errors %}
                                        <div class="invalid-feedback">{{ error }}</div>
                                    {% endfor %}
                                </div>
                            {% endfor %}

                            <button type="submit" class="btn btn-success w-100 mt-3 py-2 fw-bold">立即註冊</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted">已經有帳號了？ <a href="{% url 'login' %}" class="text-decoration-none">按此登入</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
